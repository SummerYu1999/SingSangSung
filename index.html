<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SingSangSung - The Full Stage</title>
    <script src="This is me"></script> 
    
    <style>
        :root { 
            --primary: #74b9ff; 
            --accent: #ff7675; 
            --bg: #2d3436; 
            --card: #353b48; 
            --text: #dfe6e9; 
            --highlight: #ffeaa7; 
            --glitch-blue: #00d2ff;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        
        body.this-is-me-bg {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://i.guim.co.uk/img/media/69c18167301f85e8c94ca627f9d0cec61c4edef9/339_141_1331_799/master/1331.jpg?width=1200&dpr=1&s=none&crop=none');
            background-size: cover;
            background-position: center;
        }
        
        header { background: rgba(0,0,0,0.8); padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .controls { display: flex; gap: 15px; align-items: center; }
        
        .main-game { 
            display: grid; 
            grid-template-columns: 1fr 280px; 
            gap: 20px; 
            padding: 20px; 
            flex: 1; 
            max-width: 1400px; 
            margin: 0 auto; 
            width: 100%; 
        }

        .practice-window { 
            position: relative; 
            overflow: hidden; 
            background: rgba(0,0,0,0.4); 
            backdrop-filter: blur(8px);
            border-radius: 20px; 
            padding: 60px 40px; 
            height: 100%; 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .card { 
            background: rgba(53, 59, 72, 0.9); 
            padding: 18px; 
            border-radius: 14px; 
            border-left: 5px solid var(--primary); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }
        .card.hidden { opacity: 0; transform: translateX(20px); }

        #text-target { white-space: pre-wrap; color: rgba(255,255,255,0.15); position: relative; font-size: 32px; line-height: 2.2; font-weight: 500; letter-spacing: 2px; }
        
        /* 點亮時的填滿顏色效果 */
        .char-ok { 
            color: #fff; 
            text-shadow: 0 0 10px var(--glitch-blue);
            font-weight: bold;
        }
        .char-no { color: var(--accent); background: rgba(255,118,117,0.2); border-radius: 4px; }
        
        /* 當前正在打的字組提示（淡淡的下底線，讓玩家知道要打什麼羅馬拼音） */
        .current-word-hint {
            border-bottom: 2px solid rgba(116, 185, 255, 0.4);
        }

        .cursor { 
            border-left: 3px solid var(--glitch-blue); 
            animation: blink 0.8s infinite; 
            display: inline-block; 
            height: 1.1em; 
            vertical-align: middle; 
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* 羅馬拼音浮動小提示（選配，在字上方貼心顯示現在要打什麼字母） */
        .roma-tip {
            position: absolute;
            font-size: 14px;
            color: #888;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-family: monospace;
            letter-spacing: 0px;
        }
        .char-box {
            position: relative;
            display: inline-block;
        }

        #invisible-input { position: fixed; top: -100px; opacity: 0; }
    </style>
</head>
<body onclick="document.getElementById('invisible-input').focus()">

    <header>
        <div class="controls">
            <input type="color" id="theme-color" value="#74b9ff" oninput="changeTheme(this.value)" style="border:none; width:30px; height:30px; background:none; cursor:pointer; padding:0;">
            <span style="font-size: 22px; font-weight: 900; color: var(--primary); letter-spacing: 1px;">SingSangSung</span>
            <select id="song-select" onchange="loadSong()" style="background:#444; color:#fff; border:1px solid #666; border-radius:8px; padding:6px 12px; cursor:pointer;">
                <option value="">-- 選擇歌曲 --</option>
                <option value="song2">This Is Me (Greatest Showman)</option>
                <option value="mumei">ムメイ (Mumei)</option> 
            </select>
        </div>
        <div id="stat-display" style="font-family: monospace; font-size: 18px; color: var(--primary); font-weight: bold;">Combo: 0 | 0%</div>
    </header>

    <div class="main-game" id="game-view" style="display:none;">
        <div class="practice-window" id="window-root">
            <div id="scroll-engine">
                <div id="text-target"></div>
            </div>
            <textarea id="invisible-input" spellcheck="false" autocomplete="off"></textarea>
        </div>

        <div class="sidebar">
            <div class="card" id="card-vocab">
                <div id="vocab-hint"></div>
            </div>
            <div class="card" id="card-trans" style="border-left-color:#a29bfe;">
                <div id="trans-hint" style="line-height: 1.5; font-size: 18px; color:#eee; white-space: pre-wrap;"></div>
            </div>
        </div>
    </div>

    <script>
    let mainPlaylist = {};
    let current = null, isMapMode = false;
    
    // 全域比對對照表
    let processedLines = []; 
    let totalTargetLength = 0;

    window.addEventListener('DOMContentLoaded', () => {
        if (typeof songData !== 'undefined' && songData["song2"]) {
            mainPlaylist["song2"] = songData["song2"];
        }

        // 完美的 mumei 資料配置
        mainPlaylist["mumei"] = {
            "title": "ムメイ (Mumei)",
            "isJapanese": true, // 標記為日文模式
            "lyrics": [
                "wasu re te shi matta koto dake o oboe te iru",
                "pokari to aita ana no saki de kimi to de a tta",
                "na mae mo kao mo waka ra nai kimi",
                "nan daka natsu ka shi i youna kiga shi ta",
                "taga i na ana ume tei ku you ni",
                "fusa ge atte wara i atte",
                "sekai a a a a a ai no doko ga ni iru kimi no tame",
                "ima a a a a a i ki tei ru yo boku ra mumei no mama"
            ],
            "displayLyrics": [
                "忘 れ て し まった こと だけ を 覚え て いる", // 這裡貼心地用空格把字分開，以便程式 1:1 完美捕捉！
                "ぽかり と 空いた 穴 の 先 で 君 と 出会った",
                "名前 も 顔 も わから ない 君",
                "なんだか 懐かしい ような 気が した",
                "互い に 穴 埋めて いく ように",
                "ふさげあって 笑いあって",
                "世界 a a a a a ai の どこか に いる 君 の ため",
                "今 a a a a a i きて いる よ 僕ら 無名 の まま"
            ],
            "translations": [
                "僅僅只記得那些早已忘卻的事物",
                "在破裂的空洞的那端和你相遇了",
                "無論是你的名字還是臉龐全都不清楚",
                "卻不知為何令人有了似曾相似的感覺",
                "像是互相填補對方的空洞一般",
                "共同嬉鬧 共同歡笑",
                "為了存在於世界之中某處的你",
                "現在依然活著的我們始終無名"
            ],
            "vocab": [
                { "word": "wasu re te", "index": 0, "k": "忘れて", "n": "忘記" },
                { "word": "na mae", "index": 2, "k": "名前", n: "名字" }
            ]
        };
    });

    function loadSong() {
        const key = document.getElementById('song-select').value;
        if (!mainPlaylist[key]) {
            document.getElementById('game-view').style.display = 'none';
            return;
        }
        current = mainPlaylist[key];
        isMapMode = !!current.isJapanese;

        if (key === 'song2') {
            document.body.classList.add('this-is-me-bg');
        } else {
            document.body.classList.remove('this-is-me-bg');
        }

        // 初始化對照對應表
        processedLines = [];
        totalTargetLength = 0;
        
        if (isMapMode) {
            // 日文結構化對齊處理
            for (let l = 0; l < current.lyrics.length; l++) {
                const romaWords = current.lyrics[l].split(' ');
                const jpWords = current.displayLyrics[l].split(' ');
                
                let lineObj = { romaStr: "", mapArr: [], rawJp: current.displayLyrics[l].replace(/ /g, "") };
                let romaCursor = 0;
                
                for (let w = 0; w < romaWords.length; w++) {
                    let rW = romaWords[w];
                    let jW = jpWords[w] || "";
                    
                    lineObj.mapArr.push({
                        roma: rW,
                        jp: jW,
                        lineStart: romaCursor,
                        lineEnd: romaCursor + rW.length
                    });
                    lineObj.romaStr += rW + (w === romaWords.length - 1 ? "\n" : " ");
                    romaCursor += rW.length + 1; 
                }
                processedLines.push(lineObj);
                totalTargetLength += lineObj.romaStr.length;
            }
        } else {
            // 英文模式：回復原本普通模式
            current.lyrics.forEach(line => {
                processedLines.push({ romaStr: line + "\n" });
                totalTargetLength += line.length + 1;
            });
        }

        document.getElementById('invisible-input').value = "";
        document.getElementById('game-view').style.display = 'grid';
        render();
        setTimeout(() => document.getElementById('invisible-input').focus(), 100);
    }

    document.getElementById('invisible-input').addEventListener('input', () => {
        render();
        updateStats();
    });

    function render() {
        const val = document.getElementById('invisible-input').value;
        let html = "";
        let globalRomaCursor = 0;

        if (!isMapMode) {
            // --- 英文模式（This is me）維持原廠設定 ---
            let fullTarget = processedLines.map(p => p.romaStr).join('');
            for (let i = 0; i < fullTarget.length; i++) {
                let cls = "";
                if (i < val.length) cls = (val[i] === fullTarget[i] ? 'char-ok' : 'char-no');
                html += `<span class="${cls}">${fullTarget[i]}</span>`;
                if (i === val.length - 1) html += `<span class="cursor"></span>`;
            }
            if (val.length === 0) html = `<span class="cursor"></span>` + fullTarget;
            document.getElementById('text-target').innerHTML = html;
            return;
        }

        // --- 日文特殊連動模式 ---
        for (let l = 0; l < processedLines.length; l++) {
            const line = processedLines[l];
            
            for (let m = 0; m < line.mapArr.length; m++) {
                const block = line.mapArr[m];
                const blockGlobalStart = globalRomaCursor + block.lineStart;
                const blockGlobalEnd = globalRomaCursor + block.lineEnd;
                
                // 算玩家在這個字組裡打對了幾個字
                let correctCount = 0;
                let hasWrong = false;
                for (let i = 0; i < block.roma.length; i++) {
                    let idx = blockGlobalStart + i;
                    if (idx < val.length) {
                        if (val[idx] === block.roma[i]) {
                            if (!hasWrong) correctCount++;
                        } else {
                            hasWrong = true;
                        }
                    }
                }

                // 計算這個字組點亮的假名/漢字比例
                let ratio = block.roma.length > 0 ? correctCount / block.roma.length : 0;
                let jpLitCount = Math.floor(block.jp.length * ratio);
                if (correctCount === block.roma.length) jpLitCount = block.jp.length; // 全對就全開

                // 是否正在輸入這個字組
                let isCurrentBlock = val.length >= blockGlobalStart && val.length < blockGlobalEnd;

                html += `<span class="char-box ${isCurrentBlock ? 'current-word-hint' : ''}">`;
                
                // 渲染日文字：一部份變亮（填滿顏色），一部份維持灰色
                for (let j = 0; j < block.jp.length; j++) {
                    if (j < jpLitCount) {
                        html += `<span class="char-ok">${block.jp[j]}</span>`;
                    } else {
                        html += `<span>${block.jp[j]}</span>`;
                    }
                }
                
                // 貼心提示：如果是目前正在打的字，在上面淡淡顯示羅馬拼音提示
                if (isCurrentBlock && block.roma.trim() !== "") {
                    html += `<span class="roma-tip">${block.roma}</span>`;
                }

                if (val.length - 1 >= blockGlobalStart && val.length - 1 < blockGlobalEnd && (val.length - 1 === blockGlobalStart + correctCount - 1 || val.length === blockGlobalEnd - 1)) {
                    // 游標放置邏輯
                }
                
                html += `</span>`;
                
                // 空格渲染
                if (m < line.mapArr.length - 1) html += " ";
            }

            // 換行時補上游標檢測
            if (val.length === globalRomaCursor + line.romaStr.length - 1) {
                html += `<span class="cursor"></span>`;
            }
            html += "\n";
            globalRomaCursor += line.romaStr.length;
        }

        if (val.length === 0) {
            html = `<span class="cursor"></span>` + html;
        } else {
            // 在末尾或中間補上游標
            html = html.replace(/<\/span>$/, `</span><span class="cursor"></span>`);
        }

        document.getElementById('text-target').innerHTML = html;
        
        // 滾動引擎滾動
        const curEl = document.querySelector('.current-word-hint') || document.getElementById('text-target');
        const offset = val.length === 0 ? 0 : (curEl.offsetTop - 20);
        document.getElementById('scroll-engine').style.transform = `translateY(-${Math.max(0, offset)}px)`;
    }

    function updateStats() {
        const val = document.getElementById('invisible-input').value;
        
        // 算出目前在哪一行
        let accumulated = 0;
        let lineIdx = 0;
        for (let i = 0; i < processedLines.length; i++) {
            accumulated += processedLines[i].romaStr.length;
            if (val.length < accumulated) {
                lineIdx = i;
                break;
            }
            if (i === processedLines.length - 1) lineIdx = processedLines.length - 1;
        }

        document.getElementById('trans-hint').innerText = current.translations[lineIdx] || "";
        
        // 計算精準度
        let fullTarget = processedLines.map(p => p.romaStr).join('');
        let correct = 0;
        for(let i=0; i<val.length; i++) if(val[i] === fullTarget[i]) correct++;
        const percent = val.length > 0 ? Math.floor((correct / val.length) * 100) : 0;
        document.getElementById('stat-display').innerText = `Combo: ${val.length} | ${percent}%`;
    }

    function changeTheme(color) {
        document.documentElement.style.setProperty('--primary', color);
    }
    </script>
</body>
</html>
